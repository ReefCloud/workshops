name: Test Render and publish the tutorials

on:
  workflow_dispatch:
#  pull_request:
#  push:
#    branches: ['release']

jobs:
  render-tutorials:
    runs-on: ubuntu-latest

    name: ${{ matrix.config.r }}

    strategy:
      fail-fast: false
      matrix:
        config:
        - { r: '4.3.2' }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # ensure that more than the last commit is checked out so that we can get time stamps
      # Restore the timestamps - I am going to try to use these to work out what is new and what is not
      - name: Restore Timestamps
        uses: chetan/git-restore-mtime-action@v1

      # install graphviz
      - name: Install Graphviz
        run: sudo apt-get install graphviz

      # install R
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.R }}

      - name: Repos
        run: |
          cat("\noptions(repos=c(stan='https://mc-stan.org/r-packages/',CRAN ='https://cloud.r-project.org'))\n", file = "~/.Rprofile", append = TRUE)
        shell: Rscript {0}

      ## Install R packages
      - name: install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 2
          packages: |
            any::rmarkdown
            any::magick
            any::pdftools
            any::quarto
            any::tidyverse
            any::mvabund
            any::pander
            any::GGally
            any::plotrix
            any::PBSmapping
            any::gmodels
            any::mvtnorm
            any::coda
            any::gganimate
            any::gridExtra
            any::ggfortify
            any::DHARMa
            any::glmmTMB
            any::performance
            any::see
            any::cmdstanr
            any::brms
            any::knitr
            any::simstudy
            any::sf
            any::stars
            any::gstat
            any::patchwork
            any::remotes
            any::inlabru
            any::Hmisc
            any::igraph
            any::ggraph
            any::easystats
